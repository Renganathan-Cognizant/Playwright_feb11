name: Playwright Tests # Run Playwright tests
on: # Trigger the workflow on push or pull request to main or master branches
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs: # Define a job named 'test' that runs on the latest Ubuntu environment
  test: # Run Playwright tests
    timeout-minutes: 60 # Set a timeout of 60 minutes for the job
    runs-on: ubuntu-latest 
    steps: # Define the steps to run the Playwright tests
    - uses: actions/checkout@v4 # Check out the repository code
    - uses: actions/setup-node@v4 # Set up Node.js environment
      with:
        node-version: lts/* # Use the latest LTS version of Node.js
    - name: Install dependencies # Install project dependencies using npm
      run: npm ci # Install dependencies from package-lock.json
    - name: Install Playwright Browsers # Install Playwright browsers and dependencies
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test reportDemo.spec.ts
    - uses: actions/upload-artifact@v4 # Upload Playwright test results as an artifact
      if: ${{ !cancelled() }} 
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
